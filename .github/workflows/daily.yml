name: daily-crypto-watch

on:
  schedule:
    # 00:37 UTC = 08:37 北京时间（错峰分钟，避开整点拥堵）
    - cron: "37 0 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-crypto-watch
  cancel-in-progress: false

permissions:
  contents: write   # 需要把 docs/data.json 提交回仓库以更新 Pages

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build data
        env:
          # 可选：bitcoin-data.com 免费 key 可把限频从 10/hr 提升，留空也能跑
          BITCOIN_DATA_API_KEY: ${{ secrets.BITCOIN_DATA_API_KEY }}
        run: python scripts/build_data.py

      - name: AI narrative
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python scripts/run_narrative.py

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: $(date -u +%F)"
            git push
          fi

      - name: Telegram push
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python scripts/notify_telegram.py
